<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Jornada Dev IEFP</title>
</head>
<body>

    <div>
        <h1>Jornada Dev IEFP</h1>
        <p>Ficha de acompanhamento acadêmico para estudantes em formação na área de tecnologia</p>
        <br>
    </div>

    <form>
        <fieldset>
            <div>
                <label>Nome</label>
                <input type="text" name="nome" id="nome">
            </div>

            <div>
                <label>Apelido</label>
                <input type="text" name="apelido" id="apelido">
            </div>
        </fieldset>

        <div>
            <label>E-mail</label>
            <input type="email" name="email" id="email">
        </div>

        <div>
            <label>ID IEFP</label>
            <input type="text" name="matricula" id="matricula">
        </div>

        <div>
            <label>Qual é o seu curso?</label>
            <label>
                <input type="radio" name="curso" id="curso1" value="desenvolvimento">Desenvolvimento de Software
            </label>
            <label>
                <input type="radio" name="curso" id="curso2" value="Análise e Desenvolvimento de Sistemas">Análise e Desenvolvimento de Sistemas
            </label>
            <label>
                <input type="radio" name="curso" id="curso3" value="Linguagens de Programação">Linguagens de Programação
            </label>
            <label>
                <input type="radio" name="curso" id="curso4" value="Engeharia de Dados">Engenharia de Dados
            </label>
        </div>

        <div>
            <label>Semestre</label>
            <select name="semestre" id="semestre">
                <option selected disabled>Selecione</option>
                <option value="1">1º Semestre</option>
                <option value="2">2º Semestre</option>
                <option value="3">3º Semestre</option>
                <option value="4">4º Semestre</option>
                <option value="5">5º Semestre</option>
                <option value="6">6º Semestre</option>
                <option value="7">7º Semestre</option>
                <option value="8">8º Semestre</option>
            </select>
        </div>

        <fieldset>
            <div>
                <label>Como avalia o seu desempenho acadêmico?</label> <br><br>
                <input type="checkbox" name="desempenho1" id="desempenho1" value="Tenho facilidade na maioria das disciplinas
">
                <label for="desempenho1">Tenho facilidade na maioria das disciplinas
</label><br>
                <input type="checkbox" name="desempenho2" id="desempenho2" value="Tenho um bom desempenho, mas encontro dificuldades em alguns conteúdos
">
                <label for="desempenho2">Tenho um bom desempenho, mas encontro dificuldades em alguns conteúdos</label><br>
                <input type="checkbox" name="desempenho3" id="desempenho3" value="Preciso melhorar meus conhecimentos em algumas áreas">
                <label for="desempenho3">Preciso melhorar meus conhecimentos em algumas áreas</label><br>
                <input type="checkbox" name="desempenho4" id="desempenho4" value="Estou tendo dificuldades e preciso de apoio em algumas disciplinas">
                <label for="desempenho4">Estou tendo dificuldades e preciso de apoio em algumas disciplinas</label><br>
            </div>
        </fieldset>

        <div>
            <br>
            <label>Conte sobre sua trajetória</label>
            <textarea name="trajetória" id="trajetória" cols="30" rows="6" style="width: 26em;"></textarea>
        </div>

        <button type="submit">Submeter</button>

    </form>

</body>
</html>
